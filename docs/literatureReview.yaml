    link: 'Z. Sun, A. Feng, J. Yu, W. Zhao, and Y. Huang, “Development of autonomous sailboat sails and future perspectives: A review,” Renewable and Sustainable Energy Reviews, vol. 207, no. 114918, Sep. 2024, doi: https://doi.org/10.1016/j.rser.2024.114918.'

