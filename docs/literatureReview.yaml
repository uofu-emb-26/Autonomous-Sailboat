- type: subsection
  section: Mechanical
  subsections:
  - Chosen Design
  - Hull Build
  - Keel Build
  - Rudder Build
  - Sail Build

- type: paragraph
  heading: Mechanical - Chosen Design
  description:
  - "Trimaran + displacement hull:\n  Stability (amas rebalance when turning)\nSelf-trimming wingsail:\n  High efficiency\nFin keel with bulb:\n  Manufacturability + weight/CoM control\nSpade rudder:\n  Simplicity, easy to modify and repair"

- type: paragraph
  heading: Mechanical - Hull Build
  description:
  - "Fiberglass wet lay in 2-part female mold (bow + stern, bolted)\n7 sheets \u2248 1mm thickness\nKeel mount: extra layers + embedded metal plate + resin\nStern: extra fiberglass reinforcement, removable mounting plate"

- type: paragraph
  heading: Mechanical - Keel Build
  description:
  - "Frame: 316 steel (plate + square post + tube)\nBody: 2 mirrored fins clamped around square post\nBulb: hollow tube filled with steel bird shot for ballast"

- type: paragraph
  heading: Mechanical - Rudder Build
  description:
  - "316 steel rod + welded plate\nFore/aft clamp mechanism\nBearing for free rotation\nServo-driven rotation via shaft collar"

- type: paragraph
  heading: Mechanical - Sail Build
  description:
  - "Main sail + tail: carved foam core covered in fiberglass\nMast: hollow carbon fiber rod, free-spinning on bearing\nServo housed inside sail, wire-driven tail rotation"

- type: subsection
  section: Electrical
  subsections:
  - Servos & Power
  - Sensors
  - Communications

- type: paragraph
  heading: Electrical - Servos & Power
  description:
  - "2 servos: one for sail, one for rudder\nPower distribution board: battery \u2192 stepped-down voltages for all components"

- type: paragraph
  heading: Electrical - Sensors
  description:
  - "GPS: waypoint navigation\nIMU + magnetometer: spatial orientation\nWind sensor: sail angle optimization\nPower monitor: battery state tracking"

- type: paragraph
  heading: Electrical - Communications
  description:
  - "LoRa wireless @ 915 MHz (ISM band, North America)\nLow bandwidth, sub-GHz \u2192 greater range than WiFi/Bluetooth\nLess free-space path loss, better diffraction around obstacles"
  - "Uplink: servo position, sensor readings, battery, GPS\nDownlink: manual control or route updates"

- type: subsection
  section: Software
  subsections: []

- type: paragraph
  heading: Software
  description:
  - "STM32H755ZIT6 dual-core dev board\nFreeRTOS:\n  Real-time sensor polling\n  Control loops\nGPS navigation packages\nSTM32 HAL drivers\nC-based firmware"

