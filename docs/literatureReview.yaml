- type: paragraph
  heading: Physics of Sailing - Lift Forces
  description:
  - "Two opposing lift forces drive a sailboat:\nSail lift\nKeel lift\nNet effect: boat moves forward"

- type: paragraph
  heading: Physics of Sailing - Point of Sail
  description:
  - "Point of sail: boat's angle relative to the wind\nAngle of attack: sail's angle relative to the wind\nOptimal attack angle depends on point of sail\nNo-sail zone: \xB145\xB0 into the wind (90\xB0 total)"

- type: paragraph
  heading: Physics of Sailing - Rudder Control
  description:
  - "Rudder modifies keel force interaction\nRudder toward wind \u2192 decreased keel force \u2192 turns away from wind\nRudder away from wind \u2192 increased keel force \u2192 turns into wind"

- type: paragraph
  heading: Physics of Sailing - COE & CLR
  description:
  - "COE (Center of Effort): point where sail lift acts\nCLR (Center of Lateral Resistance): point where keel lift acts\nCOE slightly aft of CLR \u2192 weather helm\nWeather helm: boat naturally turns into wind, improving stability"

- type: subsection
  section: Boat Design
  subsections:
  - Hull Types
  - Keel Types & Sub-forms
  - Rudder Balance & Styles
  - Sail Materials
