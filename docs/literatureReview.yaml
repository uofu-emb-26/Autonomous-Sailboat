    description: 'A comprehensive article about different keel designs and sizes. This article focuses on racing vessels over endurance vessels like ours so we only used certain parts of its information. '
    link:  “Keels or Daggerboards, the pros and cons,” Sailingcatamarans.com. https://www.sailingcatamarans.com/index.php/articles/12-to-be-published-mainly-technical/53-keels-or-daggerboards-the-pros-and-cons
