- type: abstract
  description: We want to build a fully autonomous sailboat capable of traveling blue water environments for data collection and environmental monitoring. For this project we will build a semi-autonomous sailboat that can be sent a series of waypoints and then travel between them without any human intervention using standard sailing mechanics. We will need to design and build the boat, equip it with sensors and control actuators, and finally, we will need to program it to wirelessly send and receive communication from a control computer.

