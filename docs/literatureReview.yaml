- type: paragraph
  heading: Boat Design - Hull Types
  description:
  - "Displacement: slower but more stable\nPlaning: faster but less stable"

- type: paragraph
  heading: Boat Design - Keel Types & Sub-forms
  description:
  - "Full keel:\n  More stable\n  Shallow draft\n  Higher drag\nFin keel:\n  More efficient\n  Deeper draft"
  - "Squared:\n  Higher drag\nRounded:\n  Lower drag\nBulb:\n  Adds stability\n  Lowers center of mass"

- type: paragraph
  heading: Boat Design - Rudder Balance & Styles
  description:
  - "Balanced:\n  Easy to turn\n  Won't self-center\nUnbalanced:\n  Hard to turn\n  Self-centers"
  - "Spade:\n  Free-floating\n  Simple\n  More prone to damage\nSkeg:\n  Mounted to hull\n  More protected\n  More stable"

- type: paragraph
  heading: Boat Design - Sail Materials
  description:
  - "Cloth:\n  Cheaper\n  Traditional\n  More wear and tear\nRigid (plastic/metal):\n  Durable\n  More efficient lift"
  - "Autonomous boats favor rigid sails for durability"

- type: paragraph
  heading: Boat Design - Wingsail Types
  description:
  - "Traditional: motor rotates entire mainsail\n  Low complexity\n  High power consumption"
  - "Flap: motor rotates flap aft of mainsail\n  Moderate complexity\n  Moderate power"
  - "Self-trimming: tail on long rod aft of mainsail provides torque to rotate\n  Lowest power\n  Highest complexity\n  Delayed response\n  Wind-dependent"

